name: GraveDiggerX
version: ${version}
description: ${description}
api-version: '1.21'
folia-supported: true

authors: [ SyntaxDevTeam ]
website: syntaxdevteam.pl

localization:
  available: [en_US, pl_PL]
  default: en_US

main: pl.syntaxdevteam.gravediggerx.GraveDiggerX
loader: pl.syntaxdevteam.gravediggerx.loader.SyntaxLoader
has-open-classloader: false

features:
  debug: true

dependencies:
  server:
    WorldGuard:
      load: BEFORE
      required: false


permissions:
  gdx.owner:
    description: "Master permission node for GraveDiggerX"
    default: false
    children:
      gdx.cmd.help: true
      gdx.cmd.reload: true
      gdx.cmd.list: true
      gdx.cmd.admin: true
      gdx.opengrave: true

  gdx.cmd.help:
    description: "Permission to use /gdx help"
    default: true

  gdx.cmd.reload:
    description: "Permission to reload plugin configuration"
    default: op

  gdx.cmd.list:
    description: "Permission to list own graves"
    default: true

  gdx.cmd.admin:
    description: "Permission to use admin commands"
    default: op

  gdx.opengrave:
    description: "Permission to open and collect graves"
    default: true

  gdx.*:
    description: "All GraveDiggerX permissions"
    default: false
    children:
      gdx.cmd.help: true
      gdx.cmd.reload: true
      gdx.cmd.list: true
      gdx.cmd.admin: true
      gdx.opengrave: true

  grx.owner:
    description: "[LEGACY] Backward compatibility alias for gdx.owner"
    default: false
    children:
      gdx.owner: true

  grx.*:
    description: "[LEGACY] Backward compatibility alias for gdx.*"
    default: false
    children:
      gdx.*: true
